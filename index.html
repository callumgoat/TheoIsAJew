<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Countdown until hazdog files are released</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #000;
        width: 100vw;
        height: 100vh;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-width: 100vw;
        overflow: hidden;
        /* Use the single photo as a repeating background while preserving aspect ratio */
        background-image: url('IMG_5802.jpg');
        background-repeat: repeat;
        background-position: center center;
        background-size: auto;
      }
      img {
        display: block;
        height: 100vh;
        width: auto;
        max-width: none;
        object-fit: contain;
        margin: 0 auto;
      }
    .pay-now-kid {
      position: absolute;
      color: #ff0000;
      font-size: 3.5rem;
      font-weight: bold;
      text-shadow: 2px 2px 12px #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s;
      z-index: 1000;
      user-select: none;
    }
    /* Countdown styling */
    #countdown { z-index: 20; font-size: 6rem; color: #00ff40; font-weight: bold; text-shadow: 2px 2px 12px #000; letter-spacing: 3px; }
    </style>
  </head>
  <body>
    <!-- Only keep the countdown visible; background is tiled using IMG_5802.jpg -->
    <div id="countdown" aria-live="polite"></div>
    <audio id="bg-music" src="/jewmusic.mp3" autoplay loop hidden></audio>
    <script>
      // Enable music playback on user interaction if autoplay is blocked
      document.addEventListener('DOMContentLoaded', function () {
        function enableMusic() {
          const audio = document.getElementById('bg-music');
          if (audio) {
            audio.play().catch(() => {});
          }
          document.body.removeEventListener('click', enableMusic);
        }
        document.body.style.cursor = 'pointer';
        document.body.addEventListener('click', enableMusic);
      });
      function updateCountdown() {
        // Target: 26th July 2026 at 18:20 local time
        const target = new Date('2026-07-26T18:20:00');
        let diff = target - new Date();
        if (diff < 0) diff = 0;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('countdown').textContent =
          `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }
      updateCountdown();
      setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
