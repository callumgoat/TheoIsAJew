<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loading...</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #000;
        width: 100vw;
        height: 100vh;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-width: 100vw;
        overflow: hidden;
      }
      img {
        display: block;
        height: 100vh;
        width: auto;
        max-width: none;
        object-fit: contain;
        margin: 0 auto;
      }
      .side-photo {
        position: absolute;
        top: 0;
        height: 100vh;
        width: 50vw;
        object-fit: cover;
        z-index: 0;
        pointer-events: none;
      }
      .side-photo.left { left: 0; object-position: 30% 50%; }
      .side-photo.right { right: 0; object-position: 70% 50%; }
      img.center-photo { position: relative; z-index: 1; }
    .pay-now-kid {
      position: absolute;
      color: #ff0000;
      font-size: 3.5rem;
      font-weight: bold;
      text-shadow: 2px 2px 12px #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s;
      z-index: 1000;
      user-select: none;
    }
    </style>
  </head>
  <body>
    <div style="position: absolute; top: 0; left: 0; width: 100vw; text-align: center; z-index: 10;">
      <div style="font-size: 4rem; color: rgb(21, 255, 0); font-weight: bold; margin-top: 24px; text-shadow: 2px 2px 8px #000; letter-spacing: 2px;">
        THEO HAS SUCCESSFULLY PAID 🥳
      </div>
      <div id="countdown" style="font-size: 6rem; color: rgb(0, 255, 64); font-weight: bold; margin-top: 16px; text-shadow: 2px 2px 12px #000; letter-spacing: 3px;"></div>
    </div>
    <img id="side-left" class="side-photo left" src="IMG_5802-left.jpg" alt="Left side" onerror="this.onerror=null;this.src='IMG_5802.jpg'" />
    <img id="side-right" class="side-photo right" src="IMG_5802-right.jpg" alt="Right side" onerror="this.onerror=null;this.src='IMG_5802.jpg'" />
    <img src="image0.gif" alt="Loading..." loop="infinite" class="center-photo" />
    <audio id="bg-music" src="/jewmusic.mp3" autoplay loop hidden></audio>
    <div style="position: absolute; bottom: 0; left: 0; width: 100vw; text-align: center; z-index: 10;">
      <div style="font-size: 4rem; color: rgb(21, 255, 0); font-weight: bold; margin-bottom: 24px; text-shadow: 2px 2px 8px #000; letter-spacing: 2px;">
        EVERYONE SAY THANK YOU THEO 🙏
      </div>
    </div>
    <script>
      // Enable music playback on user interaction if autoplay is blocked
      document.addEventListener('DOMContentLoaded', function () {
        function enableMusic() {
          const audio = document.getElementById('bg-music');
          if (audio) {
            audio.play().catch(() => {});
          }
          document.body.removeEventListener('click', enableMusic);
        }
        document.body.style.cursor = 'pointer';
        document.body.addEventListener('click', enableMusic);
      });
      // Ensure side images fall back or hide if not available
      document.addEventListener('DOMContentLoaded', function () {
        ['side-left','side-right'].forEach(id => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener('error', function () {
            if (this.dataset.tried === '1') {
              this.style.display = 'none';
            } else {
              this.dataset.tried = '1';
              this.src = 'IMG_5802.jpg';
            }
          });
        });
      });
      function updateCountdown() {
        const target = new Date('2026-07-26T00:00:00Z');
        let diff = target - new Date();
        if (diff < 0) diff = 0;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('countdown').textContent =
          `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }
      updateCountdown();
      setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
