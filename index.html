<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loading...</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #000;
        width: 100vw;
        height: 100vh;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-width: 100vw;
        overflow: hidden;
      }
      img {
        display: block;
        height: 100vh;
        width: auto;
        max-width: none;
        object-fit: contain;
        margin: 0 auto;
      }
    .pay-now-kid {
      position: absolute;
      color: #ff0000;
      font-size: 3.5rem;
      font-weight: bold;
      text-shadow: 2px 2px 12px #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s;
      z-index: 1000;
      user-select: none;
    }
    </style>
  </head>
  <body>
    <div style="position: absolute; top: 0; left: 0; width: 100vw; text-align: center; z-index: 10;">
      <div style="font-size: 4rem; color: red; font-weight: bold; margin-top: 24px; text-shadow: 2px 2px 8px #000; letter-spacing: 2px;">
        YOU HAVE UNTIL THEN TO SEND THE MONEY KID 
      </div>
      <div id="countdown" style="font-size: 6rem; color: red; font-weight: bold; margin-top: 16px; text-shadow: 2px 2px 12px #000; letter-spacing: 3px;"></div>
    </div>
    <img src="image0.gif" alt="Loading..." loop="infinite" />
    <audio src="/jewmusic.mp3" autoplay loop hidden></audio>
    <div style="position: absolute; bottom: 0; left: 0; width: 100vw; text-align: center; z-index: 10;">
      <div style="font-size: 4rem; color: red; font-weight: bold; margin-bottom: 24px; text-shadow: 2px 2px 8px #000; letter-spacing: 2px;">
        OR EVERYTHING WILL BE LEAKED
      </div>
    </div>
    <script>
      function updateCountdown() {
        const target = new Date('2026-05-07T00:00:00Z');
        let diff = target - new Date();
        if (diff < 0) diff = 0;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('countdown').textContent =
          `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }
      updateCountdown();
      setInterval(updateCountdown, 1000);
      // PAY NOW KID floating text
      function showPayNowKid() {
        const div = document.createElement('div');
        div.textContent = 'PAY NOW KID';
        div.className = 'pay-now-kid';
        const vw = Math.max(document.documentElement.clientWidth, window.innerWidth || 0);
        const vh = Math.max(document.documentElement.clientHeight, window.innerHeight || 0);
        // Get image position and size
        const img = document.querySelector('img[src="image0.gif"]');
        let imgRect = img ? img.getBoundingClientRect() : {left: vw/2-200, top: vh/2-200, width: 400, height: 400};
        let x, y;
        let tries = 0;
        do {
          x = Math.random() * (vw - 400) + 50;
          y = Math.random() * (vh - 120) + 40;
          tries++;
        } while (
          img &&
          x + 350 > imgRect.left &&
          x < imgRect.left + imgRect.width &&
          y + 80 > imgRect.top &&
          y < imgRect.top + imgRect.height &&
          tries < 10
        );
        div.style.left = `${x}px`;
        div.style.top = `${y}px`;
        document.body.appendChild(div);
        setTimeout(() => {
          div.style.opacity = 1;
        }, 10);
        setTimeout(() => {
          div.style.opacity = 0;
        }, 2010);
        setTimeout(() => {
          div.remove();
        }, 4000);
      }
      setInterval(showPayNowKid, 3000);
    </script>
  </body>
</html>
