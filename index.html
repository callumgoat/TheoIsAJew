<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loading...</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #000;
        width: 100vw;
        height: 100vh;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-width: 100vw;
        overflow: hidden;
      }
      img {
        display: block;
        height: 100vh;
        width: auto;
        max-width: none;
        object-fit: contain;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div style="position: absolute; top: 0; left: 0; width: 100vw; text-align: center; z-index: 10;">
      <div style="font-size: 4rem; color: red; font-weight: bold; margin-top: 24px; text-shadow: 2px 2px 8px #000; letter-spacing: 2px;">
        YOU HAVE UNTIL THEN TO SEND THE MONEY KID
      </div>
      <div id="countdown" style="font-size: 6rem; color: red; font-weight: bold; margin-top: 16px; text-shadow: 2px 2px 12px #000; letter-spacing: 3px;"></div>
    </div>
    <img src="image0.gif" alt="Loading..." loop="infinite" />
    <script>
      function updateCountdown() {
        const target = new Date('2026-07-26T00:00:00Z');
        const now = new Date();
        let diff = target - now;
        if (diff < 0) diff = 0;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('countdown').textContent =
          `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }
      updateCountdown();
      setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
